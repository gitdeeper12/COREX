# COREX GitLab CI/CD Pipeline

stages:
  - test
  - build
  - deploy
  - mirror

variables:
  PYTHON_VERSION: "3.11"

cache:
  paths:
    - .cache/pip
    - .venv

before_script:
  - apt-get update -qq && apt-get install -y -qq python3-pip
  - pip install --upgrade pip
  - pip install pytest pytest-cov build twine

test-python-3-11:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest tests/ -v --cov=corex
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'

test-python-3-12:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest tests/ -v --cov=corex

test-statistical:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - python -c "from corex.modules.statistical import StatisticalStability; print('Statistical OK')"

test-representation:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - python -c "from corex.modules.representation import RepresentationInvariance; print('Representation OK')"

test-domain:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - python -c "from corex.modules.domain import DomainRobustness; print('Domain OK')"

test-intervention:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e .
    - python -c "from corex.modules.intervention import InterventionConsistency; print('Intervention OK')"

build-package:
  stage: build
  image: python:3.11-slim
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy-pypi:
  stage: deploy
  image: python:3.11-slim
  only:
    - tags
  script:
    - pip install twine
    - twine upload --username __token__ --password $PYPI_TOKEN dist/*
  environment:
    name: pypi
    url: https://pypi.org/project/corex

mirror-to-github:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - git push --mirror git@github.com:gitdeeper12/COREX.git

mirror-to-bitbucket:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  script:
    - git push --mirror https://x-token-auth:$BITBUCKET_TOKEN@bitbucket.org/gitdeeper-12/corex.git

mirror-to-codeberg:
  stage: mirror
  image: alpine/git:latest
  only:
    - main
    - tags
  script:
    - git push --mirror https://gitdeeper12:$CODEBERG_TOKEN@codeberg.org/gitdeeper12/COREX.git

pages:
  stage: deploy
  image: python:3.11-slim
  only:
    - main
  script:
    - pip install sphinx sphinx-rtd-theme
    - cd docs && make html
    - mv _build/html ../public/
  artifacts:
    paths:
      - public
  environment:
    name: pages
    url: https://gitdeeper12.gitlab.io/COREX
